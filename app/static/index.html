<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сокращение ссылок</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #f5f5f5;
    min-height: 100vh;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
}

h1 {
    text-align: center;
    color: #333;
    margin-bottom: 30px;
}

.main-content {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
}

@media (max-width: 768px) {
    .main-content {
        grid-template-columns: 1fr;
    }
}

.panel {
    background: white;
    border-radius: 12px;
    padding: 24px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.panel h2 {
    color: #555;
    margin-bottom: 20px;
    font-size: 18px;
    padding-bottom: 10px;
    border-bottom: 2px solid #f0f0f0;
}

.generate-form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.generate-form input {
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
}

.generate-form button {
    padding: 12px 24px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: background 0.2s;
}

.generate-form button:hover {
    background: #45a049;
}

#copyBtn {
    background: #2196F3;
}

#copyBtn:hover {
    background: #1976D2;
}

.slugs-list {
    list-style: none;
    max-height: 600px;
    overflow-y: auto;
}

.slug-item {
    background: #f9f9f9;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.2s;
}

.slug-item:hover {
    background: #f0f0f0;
}

.slug-info {
    flex: 1;
    min-width: 0;
}

.short-url {
    font-weight: bold;
    color: #2196F3;
    cursor: pointer;
    text-decoration: underline;
    font-size: 14px;
    display: block;
    margin-bottom: 4px;
}

.short-url:hover {
    color: #1976D2;
}

.long-url {
    font-size: 12px;
    color: #666;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
}

.delete-btn {
    padding: 6px 12px;
    background: #f44336;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: background 0.2s;
    flex-shrink: 0;
}

.delete-btn:hover {
    background: #da190b;
}

.empty {
    text-align: center;
    color: #999;
    padding: 30px;
    font-size: 14px;
}

.toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 1000;
}

.toast.show {
    opacity: 1;
}

.toast.success {
    background: #4CAF50;
}

.toast.error {
    background: #f44336;
}
</style>
</head>
<body>
<div class="container">
<h1>🔗 Сокращение ссылок</h1>

<div class="main-content">
<div class="panel">
<h2>➕ Создать ссылку</h2>
<form class="generate-form" id="generateForm">
<input type="url" id="urlInput" placeholder="Введите длинную ссылку (https://...)" required>
<button type="submit">Сократить</button>
<button type="button" id="copyBtn" style="display: none;">Копировать</button>
</form>
</div>

<div class="panel">
<h2>📋 Мои ссылки</h2>
<ul class="slugs-list" id="slugsList"></ul>
</div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = window.location.origin;
let lastShortUrl = '';

// Загрузка слагов
async function loadSlugs() {
    try {
        const response = await fetch(`${API_URL}/my_slugs`);
        const slugs = await response.json();
        renderSlugs(slugs);
    } catch (e) {
        console.error('Ошибка загрузки:', e);
    }
}

// Отрисовка слагов
function renderSlugs(slugs) {
    const list = document.getElementById('slugsList');
    
    if (slugs.length === 0) {
        list.innerHTML = '<li class="empty">Ссылок пока нет</li>';
        return;
    }
    
    list.innerHTML = slugs.map(slug => `
        <li class="slug-item">
            <div class="slug-info">
                <span class="short-url" onclick="copyShortUrl('${slug.slug}')" title="Нажмите, чтобы скопировать">${API_URL}/${slug.slug}</span>
                <span class="long-url" title="${escapeHtml(slug.long_url)}">${escapeHtml(slug.long_url)}</span>
            </div>
            <button class="delete-btn" onclick="deleteSlug('${slug.slug}')">Удалить</button>
        </li>
    `).join('');
}

// Экранирование HTML
function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// Показать уведомление
function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    toast.textContent = message;
    toast.className = 'toast show ' + type;
    setTimeout(() => toast.classList.remove('show'), 2500);
}

// Копирование короткой ссылки
function copyShortUrl(slug) {
    const shortUrl = `${API_URL}/${slug}`;
    navigator.clipboard.writeText(shortUrl).then(() => {
        showToast('Ссылка скопирована!', 'success');
    }).catch(() => {
        showToast('Не удалось скопировать', 'error');
    });
}

// Копирование последней созданной ссылки
document.getElementById('copyBtn').addEventListener('click', () => {
    if (lastShortUrl) {
        navigator.clipboard.writeText(lastShortUrl).then(() => {
            showToast('Ссылка скопирована!', 'success');
        }).catch(() => {
            showToast('Не удалось скопировать', 'error');
        });
    }
});

// Создание короткой ссылки
document.getElementById('generateForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const input = document.getElementById('urlInput');
    const url = input.value.trim();
    
    if (!url) return;
    
    try {
        const response = await fetch(`${API_URL}/generate_short_url`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: url })
        });
        
        if (response.ok) {
            const result = await response.json();
            lastShortUrl = `${API_URL}/${result.data}`;
            document.getElementById('copyBtn').style.display = 'block';
            showToast(`Ссылка создана: ${lastShortUrl}`, 'success');
            loadSlugs();
        } else {
            const error = await response.json();
            showToast(error.detail || 'Ошибка', 'error');
        }
    } catch (e) {
        showToast('Ошибка сети', 'error');
    }
});

// Удаление ссылки
async function deleteSlug(slug) {
    if (!confirm('Удалить эту ссылку?')) return;
    
    try {
        const response = await fetch(`${API_URL}/delete_slug/${slug}`, {
            method: 'DELETE'
        });
        
        if (response.ok) {
            showToast('Ссылка удалена', 'success');
            loadSlugs();
        } else {
            showToast('Не удалось удалить', 'error');
        }
    } catch (e) {
        showToast('Ошибка сети', 'error');
    }
}

// Загрузка при старте
loadSlugs();
</script>
</body>
</html>
