<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сокращение ссылок</title>
<style>
* {
 box-sizing: border-box;
 margin:0;
 padding:0;
}

body {
 font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
 background: #f5f5f5;
 min-height:100vh;
 padding:20px;
}

.container {
 max-width:1000px;
 margin:0 auto;
}

h1 {
 text-align: center;
 color: #333;
 margin-bottom:30px;
}

.admin-login-btn {
 position: absolute;
 top:20px;
 right:20px;
 padding:8px 16px;
 background: #FF9800;
 color: white;
 border: none;
 border-radius:6px;
 cursor: pointer;
 font-size:14px;
 transition: background 0.2s;
}

.admin-login-btn:hover {
 background: #F57C00;
}

.admin-logout-btn {
 position: absolute;
 top:20px;
 right:20px;
 padding:8px 16px;
 background: #757575;
 color: white;
 border: none;
 border-radius:6px;
 cursor: pointer;
 font-size:14px;
 transition: background 0.2s;
}

.admin-logout-btn:hover {
 background: #616161;
}

.modal-overlay {
 display: none;
 position: fixed;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background: rgba(0,0,0,0.5);
 justify-content: center;
 align-items: center;
 z-index:1000;
}

.modal-overlay.active {
 display: flex;
}

.modal {
 background: white;
 padding:30px;
 border-radius:12px;
 width:90%;
 max-width:400px;
 box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.modal h2 {
 margin-bottom:20px;
 color: #333;
}

.modal input {
 width:100%;
 padding:12px;
 margin-bottom:12px;
 border:1px solid #ddd;
 border-radius:8px;
 font-size:14px;
}

.modal button {
 width:100%;
 padding:12px;
 background: #4CAF50;
 color: white;
 border: none;
 border-radius:8px;
 font-size:16px;
 cursor: pointer;
 transition: background 0.2s;
}

.modal button:hover {
 background: #45a049;
}

.modal-close {
 background: #f44336 !important;
 margin-top:10px;
}

.modal-close:hover {
 background: #da190b !important;
}

.main-content {
 display: grid;
 grid-template-columns: 1fr 1fr;
 gap:30px;
}

@media (max-width:768px) {
 .main-content {
 grid-template-columns: 1fr;
 }
}

.panel {
 background: white;
 border-radius:12px;
 padding:24px;
 box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.panel h2 {
 color: #555;
 margin-bottom:20px;
 font-size:18px;
 padding-bottom:10px;
 border-bottom:2px solid #f0f0f0;
}

.generate-form {
 display: flex;
 flex-direction: column;
 gap:12px;
}

.generate-form input {
 padding:12px;
 border:1px solid #ddd;
 border-radius:8px;
 font-size:14px;
}

.generate-form button {
 padding:12px 24px;
 background: #4CAF50;
 color: white;
 border: none;
 border-radius:8px;
 font-size:16px;
 cursor: pointer;
 transition: background 0.2s;
}

.generate-form button:hover {
 background: #45a049;
}

.result-link {
 display: none;
 padding: 10px;
 background: #e3f2fd;
 border-radius: 6px;
 text-align: center;
 cursor: pointer;
}

.result-link span {
 color: #1976D2;
 font-weight: bold;
}

.slugs-list {
 list-style: none;
 max-height:600px;
 overflow-y: auto;
}

.slug-item {
 background: #f9f9f9;
 padding:12px;
 margin-bottom:10px;
 border-radius:8px;
 display: flex;
 align-items: center;
 gap:10px;
 transition: background 0.2s;
}

.slug-item:hover {
 background: #f0f0f0;
}

.slug-info {
 flex:1;
 min-width:0;
}

.short-url {
 font-weight: bold;
 color: #2196F3;
 cursor: pointer;
 text-decoration: underline;
 font-size:14px;
 display: block;
 margin-bottom:4px;
}

.short-url:hover {
 color: #1976D2;
}

.long-url {
 font-size:12px;
 color: #666;
 white-space: nowrap;
 overflow: hidden;
 text-overflow: ellipsis;
 display: block;
}

.user-id {
 font-size:11px;
 color: #999;
 margin-top:2px;
}

.delete-btn {
 padding:6px 12px;
 background: #f44336;
 color: white;
 border: none;
 border-radius:6px;
 cursor: pointer;
 font-size:12px;
 transition: background 0.2s;
 flex-shrink:0;
}

.delete-btn:hover {
 background: #da190b;
}

.block-btn {
 padding:6px 12px;
 background: #FF9800;
 color: white;
 border: none;
 border-radius:6px;
 cursor: pointer;
 font-size:12px;
 transition: background 0.2s;
 flex-shrink:0;
}

.block-btn:hover {
 background: #F57C00;
}

.block-btn.blocked {
 background: #4CAF50;
}

.block-btn.blocked:hover {
 background: #45a049;
}

.slug-item.banned {
 opacity: 0.6;
 background: #ffebee;
}

.slug-item.banned .short-url {
 color: #c62828;
 text-decoration: line-through;
 cursor: default;
}

.badge {
 display: inline-block;
 padding:2px 8px;
 border-radius:4px;
 font-size:11px;
 font-weight: bold;
 margin-left:8px;
}

.badge.blocked {
 background: #f44336;
 color: white;
}

.badge.active {
 background: #4CAF50;
 color: white;
}

.empty {
 text-align: center;
 color: #999;
 padding:30px;
 font-size:14px;
}

.admin-panel {
 display: none;
 margin-top:30px;
}

.admin-panel.active {
 display: block;
}

.admin-badge {
 display: inline-block;
 background: #FF9800;
 color: white;
 padding:4px 12px;
 border-radius:12px;
 font-size:12px;
 margin-left:10px;
}

.toast {
 position: fixed;
 bottom:20px;
 left:50%;
 transform: translateX(-50%);
 background: #333;
 color: white;
 padding:12px 24px;
 border-radius:8px;
 opacity:0;
 transition: opacity 0.3s;
 pointer-events: none;
 z-index:1000;
}

.toast.show {
 opacity:1;
}

.toast.success {
 background: #4CAF50;
}

.toast.error {
 background: #f44336;
}
</style>
</head>
<body>
<div class="container">
 <h1>🔗 Сокращение ссылок</h1>
 
 <button class="admin-login-btn" id="adminLoginBtn" onclick="openLoginModal()">Вход для админа</button>
 <button class="admin-logout-btn" id="adminLogoutBtn" onclick="adminLogout()" style="display: none;">Выйти</button>

 <div class="main-content">
 <div class="panel">
 <h2>➕ Создать ссылку</h2>
 <form class="generate-form" id="generateForm">
 <input type="url" id="urlInput" placeholder="Введите длинную ссылку (https://...)" required>
 <button type="submit">Сократить</button>
 <div class="result-link" id="resultLink" onclick="copyLastShortUrl()">
 <span></span>
 </div>
 </form>
 </div>

 <div class="panel">
 <h2>📋 Мои ссылки</h2>
 <ul class="slugs-list" id="slugsList"></ul>
 </div>
 </div>

 <div class="admin-panel" id="adminPanel">
 <div class="panel">
 <h2>👑 Все ссылки в БД <span class="admin-badge">АДМИН</span></h2>

 <div style="display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap;">
 <input type="text" id="filterSlug" placeholder="Slug" style="flex: 1; min-width: 120px; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
 <input type="text" id="filterUrl" placeholder="URL" style="flex: 2; min-width: 200px; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
 <input type="text" id="filterUserId" placeholder="User ID" style="flex: 1; min-width: 120px; padding: 8px; border: 1px solid #ddd; border-radius: 6px;">
 <button onclick="searchSlugs()" style="padding: 8px 20px; background: #2196F3; color: white; border: none; border-radius: 6px; cursor: pointer;">🔍 Найти</button>
 <button onclick="resetFilters()" style="padding: 8px 20px; background: #9E9E9E; color: white; border: none; border-radius: 6px; cursor: pointer;">🔄 Сброс</button>
 </div>

 <ul class="slugs-list" id="adminSlugsList"></ul>
 </div>
 </div>
</div>

<div class="modal-overlay" id="loginModal">
 <div class="modal">
 <h2>🔐 Вход для администратора</h2>
 <input type="text" id="loginInput" placeholder="Логин" autocomplete="username">
 <input type="password" id="passwordInput" placeholder="Пароль" autocomplete="current-password">
 <button onclick="adminLogin()">Войти</button>
 <button class="modal-close" onclick="closeLoginModal()">Отмена</button>
 </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = window.location.origin;
let lastShortUrl = '';
let adminToken = localStorage.getItem('admin_token') || null;
let currentUserId = null;

// === Инициализация ===
document.addEventListener('DOMContentLoaded', () => {
 updateAdminUI();
 loadSlugs();
});

// === Админ UI ===
function updateAdminUI() {
 const loginBtn = document.getElementById('adminLoginBtn');
 const logoutBtn = document.getElementById('adminLogoutBtn');
 const adminPanel = document.getElementById('adminPanel');
 
 if (adminToken) {
 loginBtn.style.display = 'none';
 logoutBtn.style.display = 'block';
 adminPanel.classList.add('active');
 searchSlugs();
 } else {
 loginBtn.style.display = 'block';
 logoutBtn.style.display = 'none';
 adminPanel.classList.remove('active');
 }
}

function openLoginModal() {
 document.getElementById('loginModal').classList.add('active');
}

function closeLoginModal() {
 document.getElementById('loginModal').classList.remove('active');
 document.getElementById('loginInput').value = '';
 document.getElementById('passwordInput').value = '';
}

async function adminLogin() {
 const login = document.getElementById('loginInput').value.trim();
 const password = document.getElementById('passwordInput').value;
 
 if (!login || !password) {
 showToast('Введите логин и пароль', 'error');
 return;
 }
 
 try {
 const response = await fetch(`${API_URL}/auth/login`, {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ login, password })
 });
 
 if (response.ok) {
 const data = await response.json();
 adminToken = data.access_token;
 localStorage.setItem('admin_token', adminToken);
 closeLoginModal();
 updateAdminUI();
 showToast('Вход выполнен!', 'success');
 } else {
 const error = await response.json();
 showToast(error.detail || 'Неверный логин или пароль', 'error');
 }
 } catch (e) {
 showToast('Ошибка сети', 'error');
 }
}

function adminLogout() {
 adminToken = null;
 localStorage.removeItem('admin_token');
 updateAdminUI();
 showToast('Вы вышли из системы', 'success');
}

// === HTML-шаблоны ===
function createUserSlugHTML(slug, url, available) {
 const isBlocked = !available;
 const itemClass = isBlocked ? 'slug-item banned' : 'slug-item';
 const badge = isBlocked ? '<span class="badge blocked">ЗАБЛОКИРОВАНО</span>' : '';
 const clickAttr = isBlocked ? '' : `onclick="copyShortUrl('${slug}')"`;
 const cursorStyle = isBlocked ? 'cursor: default; text-decoration: line-through;' : '';
 const title = isBlocked ? 'Ссылка заблокирована администратором' : 'Нажмите, чтобы скопировать';

 return `
 <li class="${itemClass}" data-slug="${slug}">
 <div class="slug-info">
 <span class="short-url" ${clickAttr} style="${cursorStyle}" title="${title}">${API_URL}/${slug}${badge}</span>
 <span class="long-url" title="${escapeHtml(url)}">${escapeHtml(url)}</span>
 </div>
 <button class="delete-btn" onclick="deleteSlug('${slug}')">Удалить</button>
 </li>
 `;
}

function createAdminSlugHTML(slug, url, userId, available) {
 const isBlocked = !available;
 const blockText = isBlocked ? 'Разблокировать' : 'Заблокировать';
 const blockClass = isBlocked ? 'block-btn blocked' : 'block-btn';
 const itemClass = isBlocked ? 'slug-item banned' : 'slug-item';
 const badge = isBlocked
 ? '<span class="badge blocked">ЗАБЛОКИРОВАНО</span>'
 : '<span class="badge active">АКТИВНО</span>';
 const userDisplay = userId || '—';

 return `
 <li class="${itemClass}" data-slug="${slug}">
 <div class="slug-info">
 <span class="short-url" onclick="copyShortUrl('${slug}')" title="Нажмите, чтобы скопировать">${API_URL}/${slug}${badge}</span>
 <span class="long-url" title="${escapeHtml(url)}">${escapeHtml(url)}</span>
 <span class="user-id">👤 ${userDisplay}</span>
 </div>
 <button class="${blockClass}" onclick="toggleBlock('${slug}')">${blockText}</button>
 <button class="delete-btn" onclick="deleteAdminSlug('${slug}')">Удалить</button>
 </li>
 `;
}

// === Локальное обновление DOM ===
function addSlugLocally(slug, url) {
 // Пользовательский список
 const userList = document.getElementById('slugsList');
 const empty = userList.querySelector('.empty');
 if (empty) empty.remove();
 
 const tempDiv = document.createElement('div');
 tempDiv.innerHTML = createUserSlugHTML(slug, url, true);
 userList.prepend(tempDiv.firstElementChild);

 // Админ-список (если открыт)
 if (adminToken) {
 const adminList = document.getElementById('adminSlugsList');
 const adminEmpty = adminList.querySelector('.empty');
 if (adminEmpty) adminEmpty.remove();
 
 const adminDiv = document.createElement('div');
 adminDiv.innerHTML = createAdminSlugHTML(slug, url, currentUserId || '—', true);
 adminList.prepend(adminDiv.firstElementChild);
 }
}

function removeSlugLocally(slug) {
 document.querySelectorAll(`li[data-slug="${slug}"]`).forEach(el => {
 const parent = el.parentElement;
 el.remove();
 // Проверяем, остались ли элементы
 if (!parent.querySelector('.slug-item')) {
 parent.innerHTML = '<li class="empty">Ссылок пока нет</li>';
 }
 });
}

function toggleBlockLocally(slug) {
 document.querySelectorAll(`li[data-slug="${slug}"]`).forEach(el => {
 const isNowBlocked = !el.classList.contains('banned');
 
 // Переключаем класс элемента
 if (isNowBlocked) {
 el.classList.add('banned');
 } else {
 el.classList.remove('banned');
 }

 // Обновляем короткий URL
 const shortUrl = el.querySelector('.short-url');
 if (shortUrl) {
 if (isNowBlocked) {
 shortUrl.style.cursor = 'default';
 shortUrl.style.textDecoration = 'line-through';
 shortUrl.removeAttribute('onclick');
 shortUrl.title = 'Ссылка заблокирована администратором';
 } else {
 shortUrl.style.cursor = '';
 shortUrl.style.textDecoration = '';
 shortUrl.setAttribute('onclick', `copyShortUrl('${slug}')`);
 shortUrl.title = 'Нажмите, чтобы скопировать';
 }
 }

 // Обновляем бейдж
 const existingBadge = shortUrl ? shortUrl.querySelector('.badge') : null;
 if (existingBadge) existingBadge.remove();
 
 if (isNowBlocked) {
 const blockedBadge = document.createElement('span');
 blockedBadge.className = 'badge blocked';
 blockedBadge.textContent = 'ЗАБЛОКИРОВАНО';
 if (shortUrl) shortUrl.appendChild(blockedBadge);
 } else {
 const activeBadge = document.createElement('span');
 activeBadge.className = 'badge active';
 activeBadge.textContent = 'АКТИВНО';
 if (shortUrl) shortUrl.appendChild(activeBadge);
 }

 // Обновляем кнопку блокировки (только в админ-списке)
 const blockBtn = el.querySelector('.block-btn');
 if (blockBtn) {
 blockBtn.textContent = isNowBlocked ? 'Разблокировать' : 'Заблокировать';
 blockBtn.classList.toggle('blocked', isNowBlocked);
 }
 });
}

// === Загрузка ссылок пользователя ===
async function loadSlugs() {
 try {
 const response = await fetch(`${API_URL}/my_slugs`);
 const slugs = await response.json();
 
 // Сохраняем user_id из первой ссылки для локального добавления
 if (slugs.length > 0 && slugs[0].user_id) {
 currentUserId = slugs[0].user_id;
 }
 
 renderSlugs(slugs);
 } catch (e) {
 console.error('Ошибка загрузки:', e);
 }
}

function renderSlugs(slugs) {
 const list = document.getElementById('slugsList');

 if (slugs.length === 0) {
 list.innerHTML = '<li class="empty">Ссылок пока нет</li>';
 return;
 }

 list.innerHTML = slugs.map(s => createUserSlugHTML(s.slug, s.long_url, s.available)).join('');
}

// === Админ: поиск с фильтрами ===
async function searchSlugs() {
 if (!adminToken) return;

 const slug = document.getElementById('filterSlug').value.trim();
 const url = document.getElementById('filterUrl').value.trim();
 const userId = document.getElementById('filterUserId').value.trim();

 const params = new URLSearchParams();
 if (slug) params.append('slug', slug);
 if (url) params.append('url', url);
 if (userId) params.append('user_id', userId);

 try {
 const response = await fetch(`${API_URL}/admin/search_slugs?${params.toString()}`, {
 headers: { 'Authorization': `Bearer ${adminToken}` }
 });
 
 if (response.ok) {
 const slugs = await response.json();
 renderAdminSlugs(slugs);
 } else if (response.status === 401) {
 adminLogout();
 showToast('Сессия истекла, войдите заново', 'error');
 } else {
 showToast('Ошибка поиска', 'error');
 }
 } catch (e) {
 showToast('Ошибка сети', 'error');
 }
}

function renderAdminSlugs(slugs) {
 const list = document.getElementById('adminSlugsList');

 if (slugs.length === 0) {
 list.innerHTML = '<li class="empty">В базе данных нет ссылок</li>';
 return;
 }

 list.innerHTML = slugs.map(s => createAdminSlugHTML(s.slug, s.long_url, s.user_id, s.available)).join('');
}

function resetFilters() {
 document.getElementById('filterSlug').value = '';
 document.getElementById('filterUrl').value = '';
 document.getElementById('filterUserId').value = '';
 searchSlugs();
}

// === Утилиты ===
function escapeHtml(text) {
 const div = document.createElement('div');
 div.textContent = text;
 return div.innerHTML;
}

function showToast(message, type = 'success') {
 const toast = document.getElementById('toast');
 toast.textContent = message;
 toast.className = 'toast show ' + type;
 setTimeout(() => toast.classList.remove('show'), 2500);
}

function copyShortUrl(slug) {
 const shortUrl = `${API_URL}/${slug}`;
 navigator.clipboard.writeText(shortUrl).then(() => {
 showToast('Ссылка скопирована!', 'success');
 }).catch(() => {
 showToast('Не удалось скопировать', 'error');
 });
}

// === Создание ссылки ===
document.getElementById('generateForm').addEventListener('submit', async (e) => {
 e.preventDefault();
 const input = document.getElementById('urlInput');
 const url = input.value.trim();
 
 if (!url) return;
 
 try {
 const response = await fetch(`${API_URL}/generate_short_url`, {
 method: 'POST',
 headers: { 'Content-Type': 'application/json' },
 body: JSON.stringify({ url: url })
 });
 
 if (response.ok) {
 const result = await response.json();
 const slug = result.data;
 lastShortUrl = `${API_URL}/${slug}`;
 
 const resultDiv = document.getElementById('resultLink');
 resultDiv.style.display = 'block';
 resultDiv.querySelector('span').textContent = lastShortUrl;
 input.value = '';
 
 // Локальное добавление в оба списка — 0 доп. запросов
 addSlugLocally(slug, url);
 showToast('Ссылка создана', 'success');
 } else {
 const error = await response.json();
 showToast(error.detail || 'Ошибка', 'error');
 }
 } catch (e) {
 showToast('Ошибка сети', 'error');
 }
});

function copyLastShortUrl() {
 if (lastShortUrl) {
 navigator.clipboard.writeText(lastShortUrl).then(() => {
 showToast('Ссылка скопирована!', 'success');
 }).catch(() => {
 showToast('Не удалось скопировать', 'error');
 });
 }
}

// === Блокировка / разблокировка (админ) ===
async function toggleBlock(slug) {
 if (!adminToken) return;

 try {
 const response = await fetch(`${API_URL}/admin/slug_block?slug=${encodeURIComponent(slug)}`, {
 method: 'PATCH',
 headers: { 'Authorization': `Bearer ${adminToken}` }
 });

 if (response.ok) {
 // Локальное переключение — 0 доп. запросов
 toggleBlockLocally(slug);
 showToast('Статус ссылки изменён', 'success');
 } else if (response.status === 401) {
 adminLogout();
 showToast('Сессия истекла, войдите заново', 'error');
 } else {
 showToast('Не удалось изменить статус', 'error');
 }
 } catch (e) {
 showToast('Ошибка сети', 'error');
 }
}

// === Удаление ссылки (пользователь) ===
async function deleteSlug(slug) {
 if (!confirm('Удалить эту ссылку?')) return;

 try {
 const response = await fetch(`${API_URL}/delete_slug/${slug}`, {
 method: 'DELETE'
 });

 if (response.ok) {
 // Локальное удаление — 0 доп. запросов
 removeSlugLocally(slug);
 showToast('Ссылка удалена', 'success');
 } else {
 showToast('Не удалось удалить', 'error');
 }
 } catch (e) {
 showToast('Ошибка сети', 'error');
 }
}

// === Удаление ссылки (админ) ===
async function deleteAdminSlug(slug) {
 if (!confirm('Удалить эту ссылку из БД?')) return;
 if (!adminToken) return;

 try {
 const response = await fetch(`${API_URL}/admin/delete_slug/${slug}`, {
 method: 'DELETE',
 headers: { 'Authorization': `Bearer ${adminToken}` }
 });

 if (response.ok) {
 // Локальное удаление — 0 доп. запросов
 removeSlugLocally(slug);
 showToast('Ссылка удалена администратором', 'success');
 } else if (response.status === 401) {
 adminLogout();
 showToast('Сессия истекла, войдите заново', 'error');
 } else {
 showToast('Не удалось удалить', 'error');
 }
 } catch (e) {
 showToast('Ошибка сети', 'error');
 }
}
</script>
</body>
</html>
